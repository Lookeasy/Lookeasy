<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lookeasy</title>
</head>
<body>
    <main>
        <div id="fundo">
            <div id="login">
                <h1>Bem vindo(a) ao Lookeasy!</h1>
                <section id="caixas">
                    <form id="questao1">
                        <label>Email</label>
                        <input type="email" name="Email" placeholder="Seu melhor email!">
                    </form>
                    <form id="questao2">
                        <label>Senha</label>
                        <input type="password" name="Senha" placeholder="Sua senha!">
                    </form>
                    <button>Entrar</button>
                    <a href="">Não tenho conta</a>
                    <a id="semsenha" href="">Esqueci minha senha</a>
                </section>
            </div>
        </div>
    </main>
</body>
</html>
